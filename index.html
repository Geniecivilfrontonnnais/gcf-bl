<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GCF – Bon unique</title>
<style>
:root{
  --bg:#F5F2ED; --card:#fff; --line:#E2DDD6; --ink:#1C1917; --muted:#78716C;
  --green:#1A3A2A; --orange:#C8400A; --gold:#F5A623;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,sans-serif}
.top{position:sticky;top:0;background:var(--green);color:#fff;padding:14px 16px;z-index:10}
.wrap{max-width:900px;margin:0 auto;padding:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
label{display:block;margin:0 0 6px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase}
input, select{width:100%;padding:11px;border:1.5px solid var(--line);border-radius:10px;background:#FAFAF8;font-size:16px;color:var(--ink)}
button{width:100%;padding:14px;border:none;border-radius:12px;font-weight:700;font-size:14px;margin-top:8px;cursor:pointer}
.btn-primary{background:var(--orange);color:#fff}
.btn-secondary{background:#fff;border:1.5px solid var(--line);color:var(--ink)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
.thumb-row{display:flex;flex-wrap:wrap;gap:8px}
.thumb{position:relative;width:82px;height:82px;border-radius:10px;overflow:hidden;background:#FAFAF8;border:2px dashed var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer}
.thumb img{width:100%;height:100%;object-fit:cover}
.xbtn{position:absolute;top:3px;right:3px;width:22px;height:22px;border:none;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-weight:700;padding:0;margin:0;cursor:pointer}
.bigNum{background:var(--green);color:var(--gold);padding:12px;border-radius:12px;font-weight:700;margin-bottom:10px}
.step{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.badge{width:28px;height:28px;border-radius:50%;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}
.hidden{display:none!important}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 18px;border-radius:999px;font-weight:700;font-size:14px;z-index:80;box-shadow:0 8px 20px rgba(0,0,0,.18);text-align:center}
.suggestions{position:absolute;left:0;right:0;top:100%;background:#fff;border:1.5px solid var(--line);border-radius:10px;margin-top:4px;max-height:220px;overflow-y:auto;z-index:40;box-shadow:0 8px 20px rgba(0,0,0,.12)}
.suggestion-item{padding:10px 12px;cursor:pointer;font-size:15px;border-bottom:1px solid #f0ece6}
.suggestion-item:last-child{border-bottom:none}
.suggestion-item:hover{background:#F5F2ED}

/* Recadrage / scanner */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:50;display:flex;flex-direction:column}
.modal-header{padding:12px;display:flex;gap:8px;background:#111;flex-wrap:wrap}
.modal-header button{margin-top:0;flex:1 1 160px}
.crop-wrap{position:relative;flex:1;overflow:hidden;touch-action:none;background:#000}
.crop-canvas{display:block;width:100%;height:100%;touch-action:none}
.handle{
  position:absolute;width:30px;height:30px;border-radius:50%;
  background:#ff3b30;border:3px solid #fff;transform:translate(-50%,-50%);
  touch-action:none;box-shadow:0 2px 8px rgba(0,0,0,.5)
}
.scan-info{width:100%;color:#fff;font-size:13px;padding:0 4px;opacity:.85}
</style>
</head>
<body>

<div class="top"><b>GCF · Bon unique</b></div>

<div class="wrap">

<div class="card">
  <div class="step"><div class="badge">1</div><b>Générer le numéro</b></div>
  <div id="startCard">
    <button id="btnGen" class="btn-primary">Générer le numéro</button>
  </div>
  <div id="numeroCard" class="hidden">
    <div class="bigNum" id="numeroBox"></div>
    <button id="btnRegen" class="btn-secondary">Regénérer</button>
  </div>
</div>

<div class="card">
  <div class="step"><div class="badge">2</div><b>Photos du BL</b></div>
  <div class="thumb-row" id="thumbRow"></div>
  <input id="galleryInput" type="file" accept="image/*" class="hidden">
  <input id="cameraInput" type="file" accept="image/*" capture="environment" class="hidden">
  <div id="ocrStatus" class="hidden" style="margin-top:10px;font-size:14px;color:var(--muted)"></div>
</div>

<div class="card">
  <div class="step"><div class="badge">3</div><b>Données du bon</b></div>
  <div class="grid">
    <div><label>Date</label><input id="date" type="date"></div>
    <div><label>Affaire</label><input id="affaire" list="affairesList" autocomplete="off"><datalist id="affairesList"></datalist></div>

    <div><label>Chef de chantier</label><input id="chef" list="chefsList" autocomplete="off"><datalist id="chefsList"></datalist></div>

    <div style="position:relative">
      <label>Fournisseur</label>
      <input id="fournisseur" type="text" autocomplete="off">
      <div id="fournisseurSuggestions" class="suggestions hidden"></div>
    </div>

    <div style="grid-column:1/-1"><label>Prix (€ HT)</label><input id="prix" type="number" step="0.01" inputmode="decimal"></div>

    <div style="grid-column:1/-1">
      <label>Prestation</label>
      <select id="prestation">
        <option value=""></option>
        <option value="Béton">Béton</option>
        <option value="Granulats">Granulats</option>
        <option value="Locatier">Locatier</option>
        <option value="Location">Location</option>
        <option value="Matériaux divers">Matériaux divers</option>
      </select>
    </div>

    <div style="grid-column:1/-1"><label>Détail / Fournitures</label><input id="detail" placeholder="Câble HTA, armoires…"></div>
  </div>
</div>

<div class="card">
  <div class="step"><div class="badge">4</div><b>PDF et Mail</b></div>
  <button id="btnPdf" class="btn-primary">Générer le PDF</button>
  <button id="btnMailRomain" class="btn-secondary">Envoyer mail Romain</button>
  <button id="btnMailMorgan" class="btn-secondary">Envoyer mail Morgan</button>
  <button id="btnReset" class="btn-secondary">Réinitialiser</button>
</div>

</div>

<div id="cropModal" class="modal hidden">
  <div class="modal-header">
    <button id="btnCancelCrop" class="btn-secondary">Annuler</button>
    <button id="btnAutoDetect" class="btn-secondary">Détecter le cadre</button>
    <button id="btnValidateCrop" class="btn-primary">Valider le scan</button>
    <div id="scanInfo" class="scan-info">Place les 4 points sur les coins du BL, puis valide.</div>
  </div>
  <div class="crop-wrap" id="cropWrap">
    <canvas id="cropCanvas" class="crop-canvas"></canvas>
    <div id="h0" class="handle"></div>
    <div id="h1" class="handle"></div>
    <div id="h2" class="handle"></div>
    <div id="h3" class="handle"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvScriptLoaded()"></script>

function findFournisseurFromText(rawText){
  const text = normalizeFournisseur(rawText);
  if(!text) return "";
  for(const alias in FOURNISSEUR_ALIASES){
    if(text.includes(normalizeFournisseur(alias))) return FOURNISSEUR_ALIASES[alias];
  }
  const sorted = [...FOURNISSEURS].sort((a, b) => b.length - a.length);
  for(const fournisseur of sorted){
    const f = normalizeFournisseur(fournisseur);
    if(f && text.includes(f)) return fournisseur;
  }
  return "";
}

function parseFrenchNumberToFloat(str){
  if(!str) return NaN;
  let s = String(str).trim().replace(/[€]/g, "").replace(/\u00A0/g, " ").replace(/\s+/g, " ");
  if (s.includes(",") && s.includes(".")) {
    if (s.lastIndexOf(",") > s.lastIndexOf(".")) s = s.replace(/\./g, "").replace(",", ".");
    else s = s.replace(/,/g, "");
  } else if (s.includes(",")) s = s.replace(/\./g, "").replace(",", ".");
  else {
    const dotCount = (s.match(/\./g) || []).length;
    if (dotCount > 1) { const parts = s.split("."); const dec = parts.pop(); s = parts.join("") + "." + dec; }
  }
  s = s.replace(/[^0-9.]/g, "");
  const val = parseFloat(s);
  return Number.isFinite(val) ? val : NaN;
}

function isReasonablePrice(val){ return Number.isFinite(val) && val > 0 && val < 100000; }
function pushPriceCandidate(bucket, rawValue){ const val = parseFrenchNumberToFloat(rawValue); if(isReasonablePrice(val)) bucket.push(val); }

function extractTotalHtCandidatesFromText(rawText){
  const buckets = { net: [], general: [], brut: [] };
  if(!rawText) return buckets;
  const text = rawText.replace(/\r/g, "\n").replace(/[ \t]+/g, " ");
  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  for(const line of lines){
    const nline = normalizeFournisseur(line);
    if(!(nline.includes("total") && nline.includes("ht"))) continue;
    if(nline.includes("ttc")) continue;
    const matches = line.match(/\d[\d\s.,]*\d|\d/g);
    if(!matches) continue;
    const isNet = nline.includes("net"), isBrut = nline.includes("brut");
    for(const m of matches){
      if(isNet) pushPriceCandidate(buckets.net, m);
      else if(isBrut) pushPriceCandidate(buckets.brut, m);
      else pushPriceCandidate(buckets.general, m);
    }
  }
  const patterns = [
    { type: "net", regex: /total\s*ht\s*net[^0-9]{0,25}([0-9][0-9\s.,]*)/gi },
    { type: "net", regex: /ht\s*total\s*net[^0-9]{0,25}([0-9][0-9\s.,]*)/gi },
    { type: "net", regex: /total\s*net\s*ht[^0-9]{0,25}([0-9][0-9\s.,]*)/gi },
    { type: "general", regex: /total\s*ht[^a-z0-9]{0,25}([0-9][0-9\s.,]*)/gi },
    { type: "general", regex: /ht\s*total[^a-z0-9]{0,25}([0-9][0-9\s.,]*)/gi },
    { type: "brut", regex: /total\s*ht\s*brut[^0-9]{0,25}([0-9][0-9\s.,]*)/gi },
    { type: "brut", regex: /ht\s*total\s*brut[^0-9]{0,25}([0-9][0-9\s.,]*)/gi }
  ];
  for(const {type, regex} of patterns){
    let match;
    while((match = regex.exec(text)) !== null) pushPriceCandidate(buckets[type], match[1]);
  }
  return buckets;
}

function chooseBestDetectedPrice(allBuckets){
  if(allBuckets.net.length) return Math.max(...allBuckets.net);
  if(allBuckets.general.length) return Math.max(...allBuckets.general);
  if(allBuckets.brut.length) return Math.max(...allBuckets.brut);
  return NaN;
}
function formatPriceForInput(value){ return Number.isFinite(value) ? value.toFixed(2) : ""; }

function parseDateParts(day, month, year){
  let d = parseInt(day, 10), m = parseInt(month, 10), y = parseInt(year, 10);
  if(year.length === 2) y = y >= 70 ? 1900 + y : 2000 + y;
  if(!Number.isInteger(d) || !Number.isInteger(m) || !Number.isInteger(y)) return null;
  if(y < 2020 || y > 2035 || m < 1 || m > 12 || d < 1 || d > 31) return null;
  const test = new Date(y, m - 1, d);
  if(test.getFullYear() !== y || test.getMonth() !== m - 1 || test.getDate() !== d) return null;
  return { d, m, y, iso: `${String(y).padStart(4,"0")}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}` };
}
function addDateCandidate(list, iso, score){
  const existing = list.find(x => x.iso === iso);
  if(existing){ existing.score = Math.max(existing.score, score); existing.count += 1; }
  else list.push({ iso, score, count: 1 });
}
function extractDateCandidatesFromText(rawText){
  const candidates = [];
  if(!rawText) return candidates;
  const lines = rawText.replace(/\r/g, "\n").split("\n").map(l => l.trim()).filter(Boolean);
  const keywordScore = (line) => {
    const n = normalizeFournisseur(line);
    let score = 1;
    if(n.includes("date")) score += 5;
    if(n.includes("bon")) score += 2;
    if(n.includes("livraison")) score += 3;
    if(n.includes("bl")) score += 2;
    if(n.includes("edition")) score += 1;
    if(n.includes("emis")) score += 1;
    if(n.includes("facture")) score -= 1;
    return score;
  };
  for(const line of lines){
    const score = keywordScore(line);
    let match;
    const regexFr = /\b(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})\b/g;
    while((match = regexFr.exec(line)) !== null){ const parsed = parseDateParts(match[1], match[2], match[3]); if(parsed) addDateCandidate(candidates, parsed.iso, score); }
    const regexIso = /\b(20\d{2})[\/\-.](\d{1,2})[\/\-.](\d{1,2})\b/g;
    while((match = regexIso.exec(line)) !== null){ const parsed = parseDateParts(match[3], match[2], match[1]); if(parsed) addDateCandidate(candidates, parsed.iso, score); }
  }
  return candidates;
}
function chooseBestDetectedDate(allDateCandidates){
  if(!allDateCandidates.length) return "";
  allDateCandidates.sort((a, b) => b.score !== a.score ? b.score - a.score : (b.count !== a.count ? b.count - a.count : b.iso.localeCompare(a.iso)));
  return allDateCandidates[0].iso;
}

async function detectDataFromAllPhotos(){
  if(!photos.length || ocrRunning) return;
  ocrRunning = true;
  try{
    let fournisseurTrouve = "";
    const allBuckets = { net: [], general: [], brut: [] };
    const allDateCandidates = [];
    for(let i = 0; i < photos.length; i++){
      const pageNumber = i + 1;
      const result = await Tesseract.recognize(photos[i], "fra", {
        logger: m => {
          if(m.status === "recognizing text"){
            const pct = Math.round((m.progress || 0) * 100);
            setOcrStatus("Lecture automatique… page " + pageNumber + "/" + photos.length + " - " + pct + "%");
          }
        }
      });
      const text = result?.data?.text || "";
      if(!fournisseurTrouve){ const c = findFournisseurFromText(text); if(c) fournisseurTrouve = c; }
      const pageBuckets = extractTotalHtCandidatesFromText(text);
      allBuckets.net.push(...pageBuckets.net); allBuckets.general.push(...pageBuckets.general); allBuckets.brut.push(...pageBuckets.brut);
      allDateCandidates.push(...extractDateCandidatesFromText(text));
    }
    if(fournisseurTrouve){ document.getElementById("fournisseur").value = fournisseurTrouve; document.getElementById("fournisseurSuggestions").classList.add("hidden"); autoFillPrestation(); }
    const bestPrice = chooseBestDetectedPrice(allBuckets);
    if(Number.isFinite(bestPrice)) document.getElementById("prix").value = formatPriceForInput(bestPrice);
    const bestDate = chooseBestDetectedDate(allDateCandidates);
    if(bestDate) document.getElementById("date").value = bestDate;
    const parts = [];
    if(document.getElementById("fournisseur").value) parts.push("Fournisseur détecté : " + document.getElementById("fournisseur").value);
    if(document.getElementById("date").value) parts.push("Date détectée : " + document.getElementById("date").value);
    if(document.getElementById("prix").value) parts.push("Prix HT détecté : " + document.getElementById("prix").value + " €");
    if(parts.length){ setOcrStatus(parts.join(" | ")); toast("Données détectées"); }
    else setOcrStatus("Aucune donnée reconnue automatiquement");
  } catch(error){ console.error(error); setOcrStatus("Erreur de lecture automatique"); }
  finally { ocrRunning = false; }
}

}

function closeCropModal(){
  cropModal.classList.add("hidden");
  cropImage = null;
  activeHandle = -1;
}

function resizeCropCanvas(){
  const rect = cropWrap.getBoundingClientRect();
  cropCanvas.width = rect.width;
  cropCanvas.height = rect.height;
  const iw = cropImage.width, ih = cropImage.height;
  const scale = Math.min(rect.width / iw, rect.height / ih);
  const w = iw * scale, h = ih * scale;
  const x = (rect.width - w) / 2, y = (rect.height - h) / 2;
  displayed = {x, y, w, h};
}

function drawCropScene(){
  cropCtx.clearRect(0, 0, cropCanvas.width, cropCanvas.height);
  cropCtx.drawImage(cropImage, displayed.x, displayed.y, displayed.w, displayed.h);
  cropCtx.fillStyle = "rgba(0,0,0,.35)";
  cropCtx.beginPath();
  cropCtx.rect(0,0,cropCanvas.width,cropCanvas.height);
  cropCtx.moveTo(cropPoints[0].x, cropPoints[0].y);
  for(let i = 1; i < cropPoints.length; i++) cropCtx.lineTo(cropPoints[i].x, cropPoints[i].y);
  cropCtx.closePath();
  cropCtx.fill("evenodd");
  cropCtx.strokeStyle = "#ff3b30";
  cropCtx.lineWidth = 3;
  cropCtx.beginPath();
  cropCtx.moveTo(cropPoints[0].x, cropPoints[0].y);
  for(let i = 1; i < cropPoints.length; i++) cropCtx.lineTo(cropPoints[i].x, cropPoints[i].y);
  cropCtx.closePath();
  cropCtx.stroke();
  handles.forEach((h, i) => { h.style.left = cropPoints[i].x + "px"; h.style.top = cropPoints[i].y + "px"; });
}

function clampPoint(p){
  p.x = Math.max(displayed.x, Math.min(displayed.x + displayed.w, p.x));
  p.y = Math.max(displayed.y, Math.min(displayed.y + displayed.h, p.y));
}

function orderPoints(points){
  const pts = points.map(p => ({x:p.x, y:p.y}));
  const sum = pts.map(p => p.x + p.y);
  const diff = pts.map(p => p.x - p.y);
  return [
    pts[sum.indexOf(Math.min(...sum))],
    pts[diff.indexOf(Math.max(...diff))],
    pts[sum.indexOf(Math.max(...sum))],
    pts[diff.indexOf(Math.min(...diff))]
  ];
}

function autoDetectPageFrame(showMessage){
  if(!cropImage){ return false; }
  if(!cvReady || !window.cv){
    if(showMessage) setScanInfo("OpenCV charge encore. Tu peux placer les points à la main ou réessayer dans 2 secondes.");
    return false;
  }

  let src, small, gray, blur, edges, contours, hierarchy;
  try{
    const temp = document.createElement("canvas");
    const maxSide = 1200;
    const scale = Math.min(1, maxSide / Math.max(cropImage.width, cropImage.height));
    temp.width = Math.round(cropImage.width * scale);
    temp.height = Math.round(cropImage.height * scale);
    temp.getContext("2d").drawImage(cropImage, 0, 0, temp.width, temp.height);

    src = cv.imread(temp);
    small = new cv.Mat();
    gray = new cv.Mat();
    blur = new cv.Mat();
    edges = new cv.Mat();
    contours = new cv.MatVector();
    hierarchy = new cv.Mat();

    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
    cv.GaussianBlur(gray, blur, new cv.Size(5,5), 0, 0, cv.BORDER_DEFAULT);
    cv.Canny(blur, edges, 50, 150);

    const kernel = cv.Mat.ones(3,3,cv.CV_8U);
    cv.dilate(edges, edges, kernel);
    cv.erode(edges, edges, kernel);
    kernel.delete();

    cv.findContours(edges, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

    let best = null;
    let bestArea = 0;
    const imageArea = temp.width * temp.height;

    for(let i = 0; i < contours.size(); i++){
      const cnt = contours.get(i);
      const peri = cv.arcLength(cnt, true);
      const approx = new cv.Mat();
      cv.approxPolyDP(cnt, approx, 0.025 * peri, true);
      const area = Math.abs(cv.contourArea(approx));

      if(approx.rows === 4 && area > bestArea && area > imageArea * 0.12){
        const pts = [];
        for(let j = 0; j < 4; j++){
          pts.push({x: approx.intPtr(j,0)[0], y: approx.intPtr(j,0)[1]});
        }
        best = pts;
        bestArea = area;
      }
      approx.delete(); cnt.delete();
    }

    if(!best){
      if(showMessage) setScanInfo("Cadre non détecté automatiquement. Place les 4 points à la main.");
      return false;
    }

    const ordered = orderPoints(best).map(p => ({
      x: displayed.x + (p.x / temp.width) * displayed.w,
      y: displayed.y + (p.y / temp.height) * displayed.h
    }));

    cropPoints = ordered;
    cropPoints.forEach(clampPoint);
    drawCropScene();
    if(showMessage) setScanInfo("Cadre détecté automatiquement. Ajuste les coins si besoin, puis valide.");
    return true;
  } catch(error){
    console.error(error);
    if(showMessage) setScanInfo("Erreur de détection. Place les 4 points à la main.");
    return false;
  } finally {
    [src, small, gray, blur, edges, hierarchy].forEach(m => { if(m) m.delete(); });
    if(contours) contours.delete();
  }
}

function getImageCoordinatesFromCropPoints(){
  return orderPoints(cropPoints).map(p => ({
    x: (p.x - displayed.x) * (cropImage.width / displayed.w),
    y: (p.y - displayed.y) * (cropImage.height / displayed.h)
  }));
}

function distance(p1, p2){ return Math.hypot(p1.x - p2.x, p1.y - p2.y); }

function perspectiveCropWithOpenCV(){
  if(!cvReady || !window.cv) return null;
  let src, dst, srcTri, dstTri;
  try{
    const points = getImageCoordinatesFromCropPoints();
    const tl = points[0], tr = points[1], br = points[2], bl = points[3];
    const width = Math.max(distance(br, bl), distance(tr, tl));
    const height = Math.max(distance(tr, br), distance(tl, bl));
    if(width < 20 || height < 20) return null;

    const temp = document.createElement("canvas");
    temp.width = cropImage.width;
    temp.height = cropImage.height;
    temp.getContext("2d").drawImage(cropImage, 0, 0);

    src = cv.imread(temp);
    dst = new cv.Mat();
    srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, [tl.x,tl.y, tr.x,tr.y, br.x,br.y, bl.x,bl.y]);
    dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [0,0, width,0, width,height, 0,height]);
    const M = cv.getPerspectiveTransform(srcTri, dstTri);
    const dsize = new cv.Size(Math.round(width), Math.round(height));
    cv.warpPerspective(src, dst, M, dsize, cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());
    M.delete();

    const out = document.createElement("canvas");
    out.width = Math.round(width);
    out.height = Math.round(height);
    cv.imshow(out, dst);
    return out.toDataURL("image/jpeg", 0.92);
  } catch(error){
    console.error(error);
    return null;
  } finally {
    [src, dst, srcTri, dstTri].forEach(m => { if(m) m.delete(); });
  }
}

function fallbackRectangleCrop(){
  const minX = Math.min(...cropPoints.map(p => p.x));
  const maxX = Math.max(...cropPoints.map(p => p.x));
  const minY = Math.min(...cropPoints.map(p => p.y));
  const maxY = Math.max(...cropPoints.map(p => p.y));
  const sx = (minX - displayed.x) * (cropImage.width / displayed.w);
  const sy = (minY - displayed.y) * (cropImage.height / displayed.h);
  const sw = (maxX - minX) * (cropImage.width / displayed.w);
  const sh = (maxY - minY) * (cropImage.height / displayed.h);
  if(sw <= 1 || sh <= 1) return null;
  const temp = document.createElement("canvas");
  temp.width = Math.max(1, Math.round(sw));
  temp.height = Math.max(1, Math.round(sh));
  temp.getContext("2d").drawImage(cropImage, sx, sy, sw, sh, 0, 0, temp.width, temp.height);
  return temp.toDataURL("image/jpeg", 0.92);
}

async function generatePdf(){
  try{
    if(!numero){ alert("Générez le numéro d'abord"); return; }
    if(!photos.length){ alert("Ajoutez au moins une photo du BL"); return; }

    const fournisseurValue = document.getElementById("fournisseur").value || "Sans-fournisseur";
    const safeFournisseur = fournisseurValue.trim().replace(/[<>:"/\\|?*\s]+/g, "-") || "Sans-fournisseur";
    const prixValue = document.getElementById("prix").value;
    const prixNumber = parseFloat(String(prixValue || "0").replace(",", ".")) || 0;
    const prestationValue = document.getElementById("prestation").value || "";
    const detailValue = document.getElementById("detail").value || "";
    const designation = detailValue || prestationValue || "Bon de livraison";
    const affaireValue = document.getElementById("affaire").value || "";
    const chefValue = document.getElementById("chef").value || "";
    const dateValue = document.getElementById("date").value || "";

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({orientation:"landscape", unit:"mm", format:"a4"});

    function euro(v){
      return (Number(v) || 0).toLocaleString("fr-FR", {minimumFractionDigits:2, maximumFractionDigits:2}) + " €";
    }

    function drawTextInBox(text, x, y, w, h, options = {}){
      const fontSize = options.fontSize || 9;
      const bold = options.bold || false;
      const align = options.align || "left";
      const valign = options.valign || "middle";
      pdf.setFont("helvetica", bold ? "bold" : "normal");
      pdf.setFontSize(fontSize);
      pdf.setTextColor(0,0,0);
      const lines = pdf.splitTextToSize(String(text || ""), w - 4);
      let textY = y + 5;
      if(valign === "middle") textY = y + (h - (lines.length - 1) * fontSize * 0.35) / 2 + fontSize * 0.25;
      if(valign === "bottom") textY = y + h - 3;
      const textX = align === "center" ? x + w / 2 : (align === "right" ? x + w - 2 : x + 2);
      pdf.text(lines, textX, textY, {align});
    }

    function drawCoverPage(){
      pdf.setFillColor(255,255,255);
      pdf.rect(0,0,297,210,"F");
      pdf.setDrawColor(0,0,0);
      pdf.setLineWidth(0.2);

      try{
        pdf.addImage(GCF_LOGO_DATA, "PNG", 10, 8, 55, 28);
      } catch(e){
        pdf.setFont("helvetica","bold");
        pdf.setFontSize(14);
        pdf.text("Génie Civil Frontonnais", 10, 20);
      }

      pdf.setFont("helvetica","bold");
      pdf.setFontSize(10);
      pdf.text("Adresse de Facturation :", 148, 18, {align:"center"});
      pdf.line(128, 19.5, 168, 19.5);
      pdf.setFont("helvetica","normal");
      pdf.setFontSize(9);
      pdf.text("172 rue des Poiriers, ZA la Dourdenne, 31620 FRONTON", 148, 31, {align:"center"});
      pdf.text("N° SIRET : 840 779 870 00020", 148, 42, {align:"center"});
      pdf.text("N° de TVA : FR25 840 779 870", 148, 53, {align:"center"});

      const infoX = 205, labelW = 40, boxW = 50, rowH = 10;
      const infoRows = [["N° de BON", numero], ["Date", dateValue], ["Chantier", affaireValue], ["Chef de Chantier", chefValue], ["Fournisseur", fournisseurValue]];
      let yInfo = 10;
      infoRows.forEach(([label, value]) => {
        drawTextInBox(label, infoX, yInfo, labelW, rowH, {bold:true, fontSize:9});
        pdf.setLineWidth(0.8);
        pdf.rect(infoX + labelW, yInfo - 1, boxW, rowH);
        drawTextInBox(value, infoX + labelW, yInfo - 1, boxW, rowH, {fontSize:8, align:"center"});
        yInfo += 12;
      });

      const tableX = 8, tableY = 74, tableW = 281;
      const colW = [157, 35, 40, 49];
      const headerH = 9, rowH2 = 8, bodyRows = 13;
      pdf.setLineWidth(0.8);
      pdf.rect(tableX, tableY, tableW, headerH + rowH2 * bodyRows);
      let cx = tableX;
      for(let i=0;i<colW.length-1;i++){ cx += colW[i]; pdf.line(cx, tableY, cx, tableY + headerH + rowH2 * bodyRows); }
      pdf.line(tableX, tableY + headerH, tableX + tableW, tableY + headerH);

      const headers = ["DESIGNATION", "QUANTITE", "PRIX UNITAIRE", "PRIX TOTAL H.T."];
      cx = tableX;
      headers.forEach((h, i) => { drawTextInBox(h, cx, tableY, colW[i], headerH, {bold:true, fontSize:10, align:"center"}); cx += colW[i]; });

      pdf.setLineWidth(0.2);
      pdf.setLineDashPattern([1, 1.5], 0);
      for(let r=1;r<bodyRows;r++){ const yy = tableY + headerH + r * rowH2; pdf.line(tableX, yy, tableX + tableW, yy); }
      pdf.setLineDashPattern([], 0);

      const contentY = tableY + headerH;
      drawTextInBox(designation, tableX, contentY, colW[0], rowH2, {fontSize:9});
      drawTextInBox(prixNumber > 0 ? "1" : "", tableX + colW[0], contentY, colW[1], rowH2, {fontSize:9, align:"center"});
      drawTextInBox(prixNumber > 0 ? euro(prixNumber) : "", tableX + colW[0] + colW[1], contentY, colW[2], rowH2, {fontSize:9, align:"right"});
      drawTextInBox(prixNumber > 0 ? euro(prixNumber) : "", tableX + colW[0] + colW[1] + colW[2], contentY, colW[3], rowH2, {fontSize:9, align:"right"});

      const noteY = 184;
      pdf.setFont("helvetica","bold");
      pdf.setFontSize(8.5);
      pdf.text("Note importante :", 8, noteY);
      pdf.setFont("helvetica","bolditalic");
      pdf.text("Par mesure de sécurité, veuillez vous assurer de l'identité du signataire.", 8, noteY + 5);
      pdf.text("Veuillez joindre 1 exemplaire du bon de commande à votre facture.", 8, noteY + 10);
      pdf.text("Paiement à 45 jours fin de mois à réception", 8, noteY + 15);

      const totalLabelX = 220, totalBoxX = 244, totalY = 179, totalH = 9, totalW = 45;
      const tva = prixNumber * 0.20, ttc = prixNumber + tva;
      [["TOTAL HT", prixNumber], ["T.V.A 20%", tva], ["TOTAL TTC", ttc]].forEach(([label, val], i) => {
        const yy = totalY + i * totalH;
        drawTextInBox(label, totalLabelX, yy, 23, totalH, {bold:true, fontSize:9, align:"right"});
        pdf.rect(totalBoxX, yy, totalW, totalH);
        drawTextInBox(euro(val), totalBoxX, yy, totalW, totalH, {bold:true, fontSize:9, align:"center"});
      });
    }

    drawCoverPage();

    for(let i = 0; i < photos.length; i++) {
      pdf.addPage("a4", "portrait");
      const pageW = 210, pageH = 297;
      const img = new Image(); img.src = photos[i];
      await new Promise((resolve, reject) => { img.onload = resolve; img.onerror = reject; });
      const maxW = 190, maxH = 277;
      const ratio = Math.min(maxW / img.width, maxH / img.height);
      const w = img.width * ratio, h = img.height * ratio;
      const x = (pageW - w) / 2, yImg = (pageH - h) / 2;
      pdf.addImage(photos[i], "JPEG", x, yImg, w, h);
    }

    const fileName = numero + "-" + safeFournisseur + ".pdf";
    pdf.save(fileName);
    lastPdf = fileName;
    toast("PDF généré avec la trame GCF !");
  } catch(error) {
    console.error(error);
    alert("Erreur lors de la génération du PDF");
  }
}

handles.forEach((h, i) => {
  h.addEventListener("pointerdown", e => { e.preventDefault(); activeHandle = i; h.setPointerCapture(e.pointerId); });
});

cropWrap.addEventListener("pointermove", e => {
  if(activeHandle === -1) return;
  const rect = cropWrap.getBoundingClientRect();
  cropPoints[activeHandle].x = e.clientX - rect.left;
  cropPoints[activeHandle].y = e.clientY - rect.top;
  clampPoint(cropPoints[activeHandle]);
  drawCropScene();
});

window.addEventListener("pointerup", () => activeHandle = -1);

window.addEventListener("resize", () => {
  if(cropImage && !cropModal.classList.contains("hidden")) {
    const old = cropPoints.map(p => ({
      rx: (p.x - displayed.x) / displayed.w,
      ry: (p.y - displayed.y) / displayed.h
    }));
    resizeCropCanvas();
    cropPoints = old.map(p => ({x: displayed.x + p.rx * displayed.w, y: displayed.y + p.ry * displayed.h}));
    drawCropScene();
  }
});
