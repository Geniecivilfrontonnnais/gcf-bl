<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GCF – Bon unique</title>
<style>
:root{
  --bg:#F5F2ED; --card:#fff; --line:#E2DDD6; --ink:#1C1917; --muted:#78716C;
  --green:#1A3A2A; --orange:#C8400A; --gold:#F5A623;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,sans-serif}
.top{position:sticky;top:0;background:var(--green);color:#fff;padding:14px 16px}
.wrap{max-width:900px;margin:0 auto;padding:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
label{display:block;margin:0 0 6px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase}
input, select{width:100%;padding:11px;border:1.5px solid var(--line);border-radius:10px;background:#FAFAF8;font-size:16px;color:var(--ink)}
button{width:100%;padding:14px;border:none;border-radius:12px;font-weight:700;font-size:14px;margin-top:8px;cursor:pointer}
.btn-primary{background:var(--orange);color:#fff}
.btn-secondary{background:#fff;border:1.5px solid var(--line);color:var(--ink)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
.thumb-row{display:flex;flex-wrap:wrap;gap:8px}
.thumb{position:relative;width:82px;height:82px;border-radius:10px;overflow:hidden;background:#FAFAF8;border:2px dashed var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer}
.thumb img{width:100%;height:100%;object-fit:cover}
.xbtn{position:absolute;top:3px;right:3px;width:22px;height:22px;border:none;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-weight:700;padding:0;margin:0;cursor:pointer}
.bigNum{background:var(--green);color:var(--gold);padding:12px;border-radius:12px;font-weight:700;margin-bottom:10px}
.step{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.badge{width:28px;height:28px;border-radius:50%;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}
.hidden{display:none!important}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 18px;border-radius:999px;font-weight:700;font-size:14px;z-index:30;box-shadow:0 8px 20px rgba(0,0,0,.18)}
.suggestions{position:absolute;left:0;right:0;top:100%;background:#fff;border:1.5px solid var(--line);border-radius:10px;margin-top:4px;max-height:220px;overflow-y:auto;z-index:40;box-shadow:0 8px 20px rgba(0,0,0,.12)}
.suggestion-item{padding:10px 12px;cursor:pointer;font-size:15px;border-bottom:1px solid #f0ece6}
.suggestion-item:last-child{border-bottom:none}
.suggestion-item:hover{background:#F5F2ED}

/* Recadrage */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:50;display:flex;flex-direction:column}
.modal-header{padding:12px;display:flex;gap:8px;background:#111}
.modal-header button{margin-top:0}
.crop-wrap{position:relative;flex:1;overflow:hidden;touch-action:none;background:#000}
.crop-canvas{display:block;width:100%;height:100%;touch-action:none}
.handle{
  position:absolute;width:28px;height:28px;border-radius:50%;
  background:#ff3b30;border:3px solid #fff;transform:translate(-50%,-50%);
  touch-action:none;box-shadow:0 2px 8px rgba(0,0,0,.5)
}
</style>
</head>
<body>

<div class="top"><b>GCF · Bon unique</b></div>

<div class="wrap">

<div class="card">
  <div class="step"><div class="badge">1</div><b>Générer le numéro</b></div>
  <div id="startCard">
    <button id="btnGen" class="btn-primary">Générer le numéro</button>
  </div>
  <div id="numeroCard" class="hidden">
    <div class="bigNum" id="numeroBox"></div>
    <button id="btnRegen" class="btn-secondary">Regénérer</button>
  </div>
</div>

<div class="card">
  <div class="step"><div class="badge">2</div><b>Photos du BL</b></div>
  <div class="thumb-row" id="thumbRow"></div>
  <input id="galleryInput" type="file" accept="image/*" class="hidden">
  <input id="cameraInput" type="file" accept="image/*" capture="environment" class="hidden">
  <div id="ocrStatus" class="hidden" style="margin-top:10px;font-size:14px;color:var(--muted)"></div>
</div>

<div class="card">
  <div class="step"><div class="badge">3</div><b>Données du bon</b></div>
  <div class="grid">
    <div><label>Date</label><input id="date" type="date"></div>
    <div><label>Affaire</label><input id="affaire" list="affairesList" autocomplete="off"><datalist id="affairesList"></datalist></div>

    <div><label>Chef de chantier</label><input id="chef" list="chefsList" autocomplete="off"><datalist id="chefsList"></datalist></div>

    <div style="position:relative">
      <label>Fournisseur</label>
      <input id="fournisseur" type="text" autocomplete="off">
      <div id="fournisseurSuggestions" class="suggestions hidden"></div>
    </div>

    <div style="grid-column:1/-1"><label>Prix (€ HT)</label><input id="prix" type="number" step="0.01" inputmode="decimal"></div>

    <div style="grid-column:1/-1">
      <label>Prestation</label>
      <select id="prestation">
        <option value=""></option>
        <option value="Béton">Béton</option>
        <option value="Granulats">Granulats</option>
        <option value="Locatier">Locatier</option>
        <option value="Location">Location</option>
        <option value="Matériaux divers">Matériaux divers</option>
      </select>
    </div>

    <div style="grid-column:1/-1"><label>Détail / Fournitures</label><input id="detail" placeholder="Câble HTA, armoires…"></div>
  </div>
</div>

<div class="card">
  <div class="step"><div class="badge">4</div><b>PDF et Mail</b></div>
  <button id="btnPdf" class="btn-primary">Générer le PDF</button>
  <button id="btnMailRomain" class="btn-secondary">Envoyer mail Romain</button>
  <button id="btnMailMorgan" class="btn-secondary">Envoyer mail Morgan</button>
  <button id="btnReset" class="btn-secondary">Réinitialiser</button>
</div>

</div>

<div id="cropModal" class="modal hidden">
  <div class="modal-header">
    <button id="btnCancelCrop" class="btn-secondary">Annuler</button>
    <button id="btnValidateCrop" class="btn-primary">Valider la photo</button>
  </div>
  <div class="crop-wrap" id="cropWrap">
    <canvas id="cropCanvas" class="crop-canvas"></canvas>
    <div id="h0" class="handle"></div>
    <div id="h1" class="handle"></div>
    <div id="h2" class="handle"></div>
    <div id="h3" class="handle"></div>
  </div>
</div>

}

function today(){

function genNum(){
  const d = new Date();
  const p = v => String(v).padStart(2, "0");
  return String(d.getFullYear()).slice(2)
    + p(d.getMonth()+1)
    + p(d.getDate())
    + p(d.getHours())
    + p(d.getMinutes());
}

}

function normalizeFournisseur(value){
  return (value || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function populateLists(){
  const affList = document.getElementById("affairesList");
  const chefList = document.getElementById("chefsList");
  affList.innerHTML = AFFAIRES.map(v => `<option value="${v.replace(/"/g,'&quot;')}"></option>`).join("");
  chefList.innerHTML = CHEFS.map(v => `<option value="${v.replace(/"/g,'&quot;')}"></option>`).join("");
}

function autoFillPrestation(){
  const fournisseur = document.getElementById("fournisseur").value;
  const prestation = document.getElementById("prestation");
  const key = normalizeFournisseur(fournisseur);

  if (Object.prototype.hasOwnProperty.call(PRESTATION_BY_FOURNISSEUR, key)) {
    prestation.value = PRESTATION_BY_FOURNISSEUR[key];
  } else {
    prestation.value = "";
  }
}

function getFilteredFournisseurs(search){
  const s = normalizeFournisseur(search);
  const starts = [];
  const contains = [];

  for (const f of FOURNISSEURS) {
    const n = normalizeFournisseur(f);

    if (!s) {
      starts.push(f);
    } else if (n.startsWith(s)) {
      starts.push(f);
    } else if (n.includes(s)) {
      contains.push(f);
    }
  }

  return starts.concat(contains).slice(0, 12);
}

function renderFournisseurSuggestions(){
  const input = document.getElementById("fournisseur");
  const box = document.getElementById("fournisseurSuggestions");
  const results = getFilteredFournisseurs(input.value);

  if(results.length === 0){
    box.innerHTML = "";
    box.classList.add("hidden");
    return;
  }

  box.innerHTML = results.map(f => `<div class="suggestion-item" data-value="${f.replace(/"/g, '&quot;')}">${f}</div>`).join("");
  box.classList.remove("hidden");

  box.querySelectorAll(".suggestion-item").forEach(item => {
    item.addEventListener("mousedown", e => {
      e.preventDefault();
      input.value = item.dataset.value;
      box.classList.add("hidden");
      autoFillPrestation();
    });
  });
}

function hideFournisseurSuggestions(){
  setTimeout(() => {
    document.getElementById("fournisseurSuggestions").classList.add("hidden");
  }, 150);
}

function findFournisseurFromText(rawText){
  const text = normalizeFournisseur(rawText);
  if(!text) return "";

  for(const alias in FOURNISSEUR_ALIASES){
    if(text.includes(normalizeFournisseur(alias))){
      return FOURNISSEUR_ALIASES[alias];
    }
  }

  const sorted = [...FOURNISSEURS].sort((a, b) => b.length - a.length);
  for(const fournisseur of sorted){
    const f = normalizeFournisseur(fournisseur);
    if(f && text.includes(f)){
      return fournisseur;
    }
  }

  return "";
}

function parseFrenchNumberToFloat(str){
  if(!str) return NaN;

  let s = String(str)
    .replace(/\s/g, "")
    .replace(/[€]/g, "")
    .replace(/,/g, ".");

  s = s.replace(/[^0-9.]/g, "");

  const parts = s.split(".");
  if(parts.length > 2){
    const dec = parts.pop();
    s = parts.join("") + "." + dec;
  }

  const val = parseFloat(s);
  return Number.isFinite(val) ? val : NaN;
}

function extractHtCandidatesFromText(rawText){
  if(!rawText) return [];

  const text = rawText.replace(/\r/g, "\n").replace(/[ \t]+/g, " ");
  const candidates = [];

  const lines = text.split("\n");
  for(const line of lines){
    const nline = normalizeFournisseur(line);
    if(!nline.includes("ht")) continue;
    if(nline.includes("ttc")) continue;

    const matches = line.match(/\d[\d\s.,]*\d|\d/g);
    if(!matches) continue;

    for(const m of matches){
      const val = parseFrenchNumberToFloat(m);
      if(Number.isFinite(val) && val > 0){
        candidates.push(val);
      }
    }
  }

  const targetedPatterns = [
    /total\s*ht(?:\s*net|\s*brut)?[^0-9]{0,20}([0-9][0-9\s.,]*)/gi,
    /montant\s*ht[^0-9]{0,20}([0-9][0-9\s.,]*)/gi,
    /net\s*ht[^0-9]{0,20}([0-9][0-9\s.,]*)/gi,
    /ht[^0-9]{0,20}([0-9][0-9\s.,]*)/gi,
    /([0-9][0-9\s.,]*)[^a-zA-Z0-9]{0,10}€?\s*ht/gi
  ];

  for(const pattern of targetedPatterns){
    let match;
    while((match = pattern.exec(text)) !== null){
      const val = parseFrenchNumberToFloat(match[1]);
      if(Number.isFinite(val) && val > 0){
        candidates.push(val);
      }
    }
  }

  return candidates;
}

function formatPriceForInput(value){
  if(!Number.isFinite(value)) return "";
  return value.toFixed(2);
}

async function detectDataFromAllPhotos(){
  if(!photos.length || ocrRunning) return;

  ocrRunning = true;

  try{
    let fournisseurTrouve = "";
    let allCandidates = [];

    for(let i = 0; i < photos.length; i++){
      const pageNumber = i + 1;

      const result = await Tesseract.recognize(
        photos[i],
        "fra",
        {
          logger: m => {
            if(m.status === "recognizing text"){
              const pct = Math.round((m.progress || 0) * 100);
              setOcrStatus("Lecture automatique… page " + pageNumber + "/" + photos.length + " - " + pct + "%");
            }
          }
        }
      );

      const text = result?.data?.text || "";

      if(!fournisseurTrouve){
        const candidateFournisseur = findFournisseurFromText(text);
        if(candidateFournisseur){
          fournisseurTrouve = candidateFournisseur;
        }
      }

      const pageCandidates = extractHtCandidatesFromText(text);
      if(pageCandidates.length){
        allCandidates = allCandidates.concat(pageCandidates);
      }
    }

    if(fournisseurTrouve){
      document.getElementById("fournisseur").value = fournisseurTrouve;
      document.getElementById("fournisseurSuggestions").classList.add("hidden");
      autoFillPrestation();
    }

    if(allCandidates.length){
      const maxHt = Math.max(...allCandidates);
      document.getElementById("prix").value = formatPriceForInput(maxHt);
    }

    const fournisseurValue = document.getElementById("fournisseur").value;
    const prixValue = document.getElementById("prix").value;

    if(fournisseurValue && prixValue){
      setOcrStatus("Fournisseur détecté : " + fournisseurValue + " | Prix HT détecté : " + prixValue + " €");
      toast("Fournisseur et prix détectés");
    } else if(fournisseurValue){
      setOcrStatus("Fournisseur détecté : " + fournisseurValue);
      toast("Fournisseur détecté");
    } else if(prixValue){
      setOcrStatus("Prix HT détecté : " + prixValue + " €");
      toast("Prix détecté");
    } else {
      setOcrStatus("Aucune donnée reconnue automatiquement");
    }
  } catch(error){
    console.error(error);
    setOcrStatus("Erreur de lecture automatique");
  } finally {
    ocrRunning = false;
  }
}

function toData(file){
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

function startCrop(src){
  cropImage = new Image();
  cropImage.onload = openCropModal;
  cropImage.src = src;
}

function openCropModal(){
  cropModal.classList.remove("hidden");
  resizeCropCanvas();
  const m = 0.08;
  cropPoints = [
    {x:displayed.x + displayed.w * m,     y:displayed.y + displayed.h * m},
    {x:displayed.x + displayed.w * (1-m), y:displayed.y + displayed.h * m},
    {x:displayed.x + displayed.w * (1-m), y:displayed.y + displayed.h * (1-m)},
    {x:displayed.x + displayed.w * m,     y:displayed.y + displayed.h * (1-m)}
  ];
  drawCropScene();
}

function closeCropModal(){
  cropModal.classList.add("hidden");
  cropImage = null;
  activeHandle = -1;
}

function resizeCropCanvas(){
  const rect = cropWrap.getBoundingClientRect();
  cropCanvas.width = rect.width;
  cropCanvas.height = rect.height;

  const iw = cropImage.width;
  const ih = cropImage.height;
  const scale = Math.min(rect.width / iw, rect.height / ih);
  const w = iw * scale;
  const h = ih * scale;
  const x = (rect.width - w) / 2;
  const y = (rect.height - h) / 2;
  displayed = {x, y, w, h};
}

function drawCropScene(){
  cropCtx.clearRect(0, 0, cropCanvas.width, cropCanvas.height);
  cropCtx.drawImage(cropImage, displayed.x, displayed.y, displayed.w, displayed.h);

  cropCtx.strokeStyle = "#ff3b30";
  cropCtx.lineWidth = 3;
  cropCtx.beginPath();
  cropCtx.moveTo(cropPoints[0].x, cropPoints[0].y);
  for(let i = 1; i < cropPoints.length; i++) cropCtx.lineTo(cropPoints[i].x, cropPoints[i].y);
  cropCtx.closePath();
  cropCtx.stroke();

  handles.forEach((h, i) => {
    h.style.left = cropPoints[i].x + "px";
    h.style.top = cropPoints[i].y + "px";
  });
}

function clampPoint(p){
  p.x = Math.max(displayed.x, Math.min(displayed.x + displayed.w, p.x));
  p.y = Math.max(displayed.y, Math.min(displayed.y + displayed.h, p.y));
}

async function generatePdf(){
  try{
    if(!numero){
      alert("Générez le numéro d'abord");
      return;
    }

    if(!photos.length){
      alert("Ajoutez au moins une photo du BL");
      return;
    }

    const fournisseurValue = document.getElementById("fournisseur").value || "Sans-fournisseur";
    const safeFournisseur = fournisseurValue.trim().replace(/[<>:"/\\|?*\s]+/g, "-") || "Sans-fournisseur";
    const prixValue = document.getElementById("prix").value;
    const prestationValue = document.getElementById("prestation").value || "—";

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({orientation:"portrait", unit:"mm", format:"a4"});
    const pageW = 210;
    const pageH = 297;

    pdf.setFillColor(26,58,42);
    pdf.rect(0,0,pageW,28,"F");

    pdf.setTextColor(245,166,35);
    pdf.setFontSize(16);
    pdf.setFont("helvetica","bold");
    pdf.text("GCF – Génie Civil Frontonnais",14,12);

    pdf.setTextColor(255,255,255);
    pdf.setFontSize(10);
    pdf.setFont("helvetica","normal");
    pdf.text("Bon de livraison N° " + numero, 14, 22);

    pdf.setDrawColor(200,64,10);
    pdf.setLineWidth(0.8);
    pdf.line(14,32,196,32);

    const rows = [
      ["Date", document.getElementById("date").value || "—"],
      ["Affaire", document.getElementById("affaire").value || "—"],
      ["Chef de chantier", document.getElementById("chef").value || "—"],
      ["Fournisseur", fournisseurValue || "—"],
      ["Prix HT", prixValue ? (prixValue + " €") : "—"],
      ["Prestation", prestationValue],
      ["Fournitures", document.getElementById("detail").value || "—"]
    ];

    let y = 42;
    rows.forEach(([label, value]) => {
      pdf.setFont("helvetica","bold");
      pdf.setFontSize(9);
      pdf.setTextColor(120,113,108);
      pdf.text(label, 14, y);

      pdf.setFont("helvetica","normal");
      pdf.setTextColor(28,25,23);
      const lines = pdf.splitTextToSize(String(value), 130);
      pdf.text(lines, 65, y);

      y += lines.length > 1 ? (lines.length * 5.5 + 2) : 8;
    });

    for(let i = 0; i < photos.length; i++) {
      pdf.addPage();

      const img = new Image();
      img.src = photos[i];

      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
      });

      const maxW = 190;
      const maxH = 277;
      const ratio = Math.min(maxW / img.width, maxH / img.height);
      const w = img.width * ratio;
      const h = img.height * ratio;
      const x = (pageW - w) / 2;
      const yImg = (pageH - h) / 2;

      pdf.addImage(photos[i], "JPEG", x, yImg, w, h);
    }

    const fileName = numero + "-" + safeFournisseur + ".pdf";
    pdf.save(fileName);
    lastPdf = fileName;

    toast("PDF généré !");
  } catch(error) {
    console.error(error);
    alert("Erreur lors de la génération du PDF");
  }
}

handles.forEach((h, i) => {
  h.addEventListener("pointerdown", e => {
    e.preventDefault();
    activeHandle = i;
    h.setPointerCapture(e.pointerId);
  });
});

cropWrap.addEventListener("pointermove", e => {
  if(activeHandle === -1) return;
  const rect = cropWrap.getBoundingClientRect();
  cropPoints[activeHandle].x = e.clientX - rect.left;
  cropPoints[activeHandle].y = e.clientY - rect.top;
  clampPoint(cropPoints[activeHandle]);
  drawCropScene();
});

window.addEventListener("pointerup", () => activeHandle = -1);

window.addEventListener("resize", () => {
  if(cropImage && !cropModal.classList.contains("hidden")) {
    resizeCropCanvas();
    drawCropScene();
  }
});

document.getElementById("btnCancelCrop").onclick = closeCropModal;

document.getElementById("btnValidateCrop").onclick = () => {
  if(!cropImage){
    toast("Aucune image");
    return;
  }

  const minX = Math.min(...cropPoints.map(p => p.x));
  const maxX = Math.max(...cropPoints.map(p => p.x));
  const minY = Math.min(...cropPoints.map(p => p.y));
  const maxY = Math.max(...cropPoints.map(p => p.y));

  const sx = (minX - displayed.x) * (cropImage.width / displayed.w);
  const sy = (minY - displayed.y) * (cropImage.height / displayed.h);
  const sw = (maxX - minX) * (cropImage.width / displayed.w);
  const sh = (maxY - minY) * (cropImage.height / displayed.h);

  if(sw <= 1 || sh <= 1){
    toast("Recadrage invalide");
    return;
  }

  const temp = document.createElement("canvas");
  temp.width = Math.max(1, Math.round(sw));
  temp.height = Math.max(1, Math.round(sh));
  temp.getContext("2d").drawImage(cropImage, sx, sy, sw, sh, 0, 0, temp.width, temp.height);

  photos.push(temp.toDataURL("image/jpeg", 0.92));
  renderThumbs();
  closeCropModal();
  toast("Photo validée");

  setTimeout(() => {
    detectDataFromAllPhotos();
  }, 150);
};
