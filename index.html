<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GCF – Bon unique</title>
<style>
:root{
  --bg:#F5F2ED; --card:#fff; --line:#E2DDD6; --ink:#1C1917; --muted:#78716C;
  --green:#1A3A2A; --orange:#C8400A; --gold:#F5A623;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,sans-serif}
.top{position:sticky;top:0;background:var(--green);color:#fff;padding:14px 16px}
.wrap{max-width:900px;margin:0 auto;padding:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
label{display:block;margin:0 0 6px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase}
input{width:100%;padding:11px;border:1.5px solid var(--line);border-radius:10px;background:#FAFAF8;font-size:16px}
button{width:100%;padding:14px;border:none;border-radius:12px;font-weight:700;font-size:14px;margin-top:8px;cursor:pointer}
.btn-primary{background:var(--orange);color:#fff}
.btn-secondary{background:#fff;border:1.5px solid var(--line);color:var(--ink)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
.thumb-row{display:flex;flex-wrap:wrap;gap:8px}
.thumb{position:relative;width:82px;height:82px;border-radius:10px;overflow:hidden;background:#FAFAF8;border:2px dashed var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer}
.thumb img{width:100%;height:100%;object-fit:cover}
.xbtn{position:absolute;top:3px;right:3px;width:22px;height:22px;border:none;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-weight:700;padding:0;margin:0;cursor:pointer}
.bigNum{background:var(--green);color:var(--gold);padding:12px;border-radius:12px;font-weight:700;margin-bottom:10px}
.step{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.badge{width:28px;height:28px;border-radius:50%;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}
.hidden{display:none!important}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 18px;border-radius:999px;font-weight:700;font-size:14px;z-index:30;box-shadow:0 8px 20px rgba(0,0,0,.18)}
/* Recadrage */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:50;display:flex;flex-direction:column}
.modal-header{padding:12px;display:flex;gap:8px;background:#111}
.modal-header button{margin-top:0}
.crop-wrap{position:relative;flex:1;overflow:hidden;touch-action:none;background:#000}
.crop-canvas{display:block;width:100%;height:100%;touch-action:none}
.handle{
  position:absolute;width:28px;height:28px;border-radius:50%;
  background:#ff3b30;border:3px solid #fff;transform:translate(-50%,-50%);
  touch-action:none;box-shadow:0 2px 8px rgba(0,0,0,.5)
}
</style>
</head>
<body>

<div class="top"><b>GCF · Bon unique</b></div>

<div class="wrap">

<div class="card">
  <div class="step"><div class="badge">1</div><b>Générer le numéro</b></div>
  <div id="startCard">
    <button id="btnGen" class="btn-primary">Générer le numéro</button>
  </div>
  <div id="numeroCard" class="hidden">
    <div class="bigNum" id="numeroBox"></div>
    <button id="btnRegen" class="btn-secondary">Regénérer</button>
  </div>
</div>

<div class="card">
  <div class="step"><div class="badge">2</div><b>Photos du BL</b></div>
  <div class="thumb-row" id="thumbRow"></div>
  <input id="galleryInput" type="file" accept="image/*" class="hidden">
  <input id="cameraInput" type="file" accept="image/*" capture="environment" class="hidden">
</div>

<div class="card">
  <div class="step"><div class="badge">3</div><b>Données du bon</b></div>
  <div class="grid">
    <div><label>Date</label><input id="date" type="date"></div>
    <div><label>Affaire</label><input id="affaire" list="affairesList" autocomplete="off"><datalist id="affairesList"></datalist></div>
    <div><label>Chef de chantier</label><input id="chef" list="chefsList" autocomplete="off"><datalist id="chefsList"></datalist></div>
    <div><label>Fournisseur</label><input id="fournisseur"></div>
  </div>
</div>

<div class="card">
  <div class="step"><div class="badge">4</div><b>PDF et Mail</b></div>
  <label>Envoi du mail</label>
  <button id="btnPdf" class="btn-primary">Générer le PDF</button>
  <button id="btnMailRomain" class="btn-secondary">Envoyer mail Romain</button>
  <button id="btnMailMorgan" class="btn-secondary">Envoyer mail Morgan</button>
  
  <button id="btnReset" class="btn-secondary">Réinitialiser</button>
</div>

</div>

<div id="cropModal" class="modal hidden">
  <div class="modal-header">
    <button id="btnCancelCrop" class="btn-secondary">Annuler</button>
    <button id="btnValidateCrop" class="btn-primary">Valider la photo</button>
  </div>
  <div class="crop-wrap" id="cropWrap">
    <canvas id="cropCanvas" class="crop-canvas"></canvas>
    <div id="h0" class="handle"></div>
    <div id="h1" class="handle"></div>
    <div id="h2" class="handle"></div>
    <div id="h3" class="handle"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let numero = null;
let photos = [];
let lastPdf = "";
const thumbRow = document.getElementById("thumbRow");
const gallery = document.getElementById("galleryInput");
const camera = document.getElementById("cameraInput");
const cropModal = document.getElementById("cropModal");
const cropWrap = document.getElementById("cropWrap");
const cropCanvas = document.getElementById("cropCanvas");
const cropCtx = cropCanvas.getContext("2d");
const handles = [document.getElementById("h0"),document.getElementById("h1"),document.getElementById("h2"),document.getElementById("h3")];

const AFFAIRES = ["000 STOCK", "001 FRAIS GENERAUX", "002 INVESTISSEMENT", "073 LA GLACIERE", "108 LA GLACIERE", "143 NERAC GEGC", "153 VOINGT", "154 SOULOM", "162 CARBONNE PCCN", "170 GRAMONT REPRISE CLOTURE", "171 AUCH DEMOL CONDOS", "172 CARBONNE", "173 VIC FEZENSAC TRVX PREPA", "178 BALMA REPRISE SOGC", "179 CASTELSARRASIN BAT", "182 CISSAC", "183 MONTGROS EIFFAGE", "185 LA VERNELLE GEGC", "197 VIC FEZENSAC", "198 CASTELSARRASIN GEGC", "201 CONSTRUCTYS 2025", "208 MARSILLON ZEROPHYTO", "212 JALIS", "215 AUDON CANIVEAU", "216 CARBONNE GC", "217 THIVIERS INEO", "218 UNET INEO", "219 VALLON RTE", "220 LUZIERES OBTURATION NUISIBLES", "221 LARDIT", "222 SABLAGE CANIVEAUX", "223 LACAUNE REPRISE PISTES", "224 SEYSSES", "225 THIVIERS GEGC", "226 MONTGROS LOGE TR", "227 FERROUGE BO", "228 DALLES CNVX MPS + MONTREAL", "229 UNET GEGC", "230 LAFOURGUETTE TELECOM", "231  LARDIT EIFFAGE BO", "232 NEUSSARGUES", "233 ARVIEU TR312", "234 LERE FOUILLE HTA", "235 NEUSSARGUES INEO", "236 PREGRAND PETITS TVX", "237 REQUISTA GRANDS TVX", "238 MOUNEDE TELECOM", "239 REVEL FOUILLE HTA", "240 PARENTIS SOUTENEMENT", "241 LEGUEVIN TELECOM", "242 MEZIN PORTAIL", "243 DOUDRAC PORTAIL", "244 RIVENEUVE", "245 PASSAGE D'AGEN CNVX", "246 LUXEY CLOTURE", "247 NESTE", "248 RISCLE PT", "249 RISCLE INEO", "250 MURET DALLE", "251 ST HENRI BO", "252 ST SEVER TCFM", "253 ROJA DJ", "254 MASSEUBE"];
const CHEFS = ["Anthony CABROL", "Lionel ALRAM", "Guillaume VANGREVELYNGHE", "Morgan LANASPEZE", "Samuel REINA", "Eric LAGARDE", "Juanito MAILLOT", "David DA COSTA", "Romain PRIEUR", "Anthony LAGARDE", "Nicolas COIG", "Maxime BARTHES", "Pascal PONS", "David LOEC", "Ludovic BARDOU", "Hector GIMENEZ", "Duncan GODINEAU", "Christel FAUGERE", "Martins Pereira VITOR MANUEL", "Thomas CHAUVAN", "Gabriel DESTACAMP", "José CAMPOS", "Thibaud MARIE", "Hervé ZANARDO", "Romiro DOMINGUES"];

let cropImage = null;
let cropPoints = [];
let activeHandle = -1;
let displayed = {x:0,y:0,w:1,h:1};

function toast(msg){
  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}
function today(){ return new Date().toISOString().slice(0,10); }
function genNum(){
  let d = new Date();
  let p = v => String(v).padStart(2,"0");
  return String(d.getFullYear()).slice(2)+p(d.getMonth()+1)+p(d.getDate())+p(d.getHours())+p(d.getMinutes());
}
function setNumero(n){
  numero = n;
  document.getElementById("numeroBox").textContent = n;
  document.getElementById("startCard").classList.add("hidden");
  document.getElementById("numeroCard").classList.remove("hidden");
}
document.getElementById("btnGen").onclick = () => setNumero(genNum());
document.getElementById("btnRegen").onclick = () => setNumero(genNum());


function populateLists(){
  const affList = document.getElementById("affairesList");
  const chefList = document.getElementById("chefsList");
  affList.innerHTML = AFFAIRES.map(v => `<option value="${v.replace(/"/g,'&quot;')}"></option>`).join("");
  chefList.innerHTML = CHEFS.map(v => `<option value="${v.replace(/"/g,'&quot;')}"></option>`).join("");
}

function renderThumbs(){
  thumbRow.innerHTML = "";
  photos.forEach((src,i) => {
    let d = document.createElement("div");
    d.className = "thumb";
    d.innerHTML = '<img src="'+src+'"><button class="xbtn">×</button>';
    d.querySelector(".xbtn").onclick = e => {
      e.stopPropagation();
      photos.splice(i,1);
      renderThumbs();
    };
    thumbRow.appendChild(d);
  });
  let gal = document.createElement("div");
  gal.className = "thumb";
  gal.innerHTML = "🖼️";
  gal.onclick = () => gallery.click();
  thumbRow.appendChild(gal);
  let cam = document.createElement("div");
  cam.className = "thumb";
  cam.innerHTML = "📷";
  cam.onclick = () => camera.click();
  thumbRow.appendChild(cam);
}
function toData(file){
  return new Promise((resolve,reject) => {
    let r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

gallery.onchange = async e => {
  let f = e.target.files[0];
  if(!f) return;
  startCrop(await toData(f));
  e.target.value = "";
};
camera.onchange = async e => {
  let f = e.target.files[0];
  if(!f) return;
  startCrop(await toData(f));
  e.target.value = "";
};

function startCrop(src){
  cropImage = new Image();
  cropImage.onload = () => {
    openCropModal();
  };
  cropImage.src = src;
}
function openCropModal(){
  cropModal.classList.remove("hidden");
  resizeCropCanvas();
  const margin = 0.08;
  cropPoints = [
    {x: displayed.x + displayed.w*margin, y: displayed.y + displayed.h*margin},
    {x: displayed.x + displayed.w*(1-margin), y: displayed.y + displayed.h*margin},
    {x: displayed.x + displayed.w*(1-margin), y: displayed.y + displayed.h*(1-margin)},
    {x: displayed.x + displayed.w*margin, y: displayed.y + displayed.h*(1-margin)}
  ];
  drawCropScene();
}
function closeCropModal(){
  cropModal.classList.add("hidden");
  cropImage = null;
  activeHandle = -1;
}
function resizeCropCanvas(){
  const rect = cropWrap.getBoundingClientRect();
  cropCanvas.width = rect.width;
  cropCanvas.height = rect.height;

  const iw = cropImage.width, ih = cropImage.height;
  const scale = Math.min(rect.width / iw, rect.height / ih);
  const w = iw * scale, h = ih * scale;
  const x = (rect.width - w) / 2, y = (rect.height - h) / 2;
  displayed = {x,y,w,h};
}
function drawCropScene(){
  cropCtx.clearRect(0,0,cropCanvas.width,cropCanvas.height);
  cropCtx.drawImage(cropImage, displayed.x, displayed.y, displayed.w, displayed.h);

  cropCtx.strokeStyle = "#ff3b30";
  cropCtx.lineWidth = 3;
  cropCtx.beginPath();
  cropCtx.moveTo(cropPoints[0].x, cropPoints[0].y);
  for(let i=1;i<cropPoints.length;i++) cropCtx.lineTo(cropPoints[i].x, cropPoints[i].y);
  cropCtx.closePath();
  cropCtx.stroke();

  handles.forEach((h,i) => {
    h.style.left = cropPoints[i].x + "px";
    h.style.top = cropPoints[i].y + "px";
  });
}
function clampPoint(p){
  p.x = Math.max(displayed.x, Math.min(displayed.x + displayed.w, p.x));
  p.y = Math.max(displayed.y, Math.min(displayed.y + displayed.h, p.y));
}
handles.forEach((h,i) => {
  h.addEventListener("pointerdown", e => {
    e.preventDefault();
    activeHandle = i;
    h.setPointerCapture(e.pointerId);
  });
});
cropWrap.addEventListener("pointermove", e => {
  if(activeHandle === -1) return;
  const rect = cropWrap.getBoundingClientRect();
  cropPoints[activeHandle].x = e.clientX - rect.left;
  cropPoints[activeHandle].y = e.clientY - rect.top;
  clampPoint(cropPoints[activeHandle]);
  drawCropScene();
});
window.addEventListener("pointerup", () => activeHandle = -1);
window.addEventListener("resize", () => {
  if(cropImage && !cropModal.classList.contains("hidden")){
    resizeCropCanvas();
    drawCropScene();
  }
});

document.getElementById("btnCancelCrop").onclick = closeCropModal;

document.getElementById("btnValidateCrop").onclick = () => {
  if(!cropImage) { toast("Aucune image"); return; }

  const minX = Math.min(...cropPoints.map(p => p.x));
  const maxX = Math.max(...cropPoints.map(p => p.x));
  const minY = Math.min(...cropPoints.map(p => p.y));
  const maxY = Math.max(...cropPoints.map(p => p.y));

  const sx = (minX - displayed.x) * (cropImage.width / displayed.w);
  const sy = (minY - displayed.y) * (cropImage.height / displayed.h);
  const sw = (maxX - minX) * (cropImage.width / displayed.w);
  const sh = (maxY - minY) * (cropImage.height / displayed.h);

  if(sw <= 1 || sh <= 1) { toast("Recadrage invalide"); return; }

  const temp = document.createElement("canvas");
  temp.width = Math.max(1, Math.round(sw));
  temp.height = Math.max(1, Math.round(sh));
  const tctx = temp.getContext("2d");
  tctx.drawImage(cropImage, sx, sy, sw, sh, 0, 0, temp.width, temp.height);

  photos.push(temp.toDataURL("image/jpeg", 0.92));
  renderThumbs();
  closeCropModal();
  toast("Photo validée");
};

async function generatePdf(){
  if(!numero){ alert("Générer le numéro"); return; }
  if(!photos.length){ alert("Ajouter une photo"); return; }

  const {jsPDF} = window.jspdf;
  let pdf = new jsPDF({orientation:"portrait", unit:"mm", format:"a4"});
  const pageW = pdf.internal.pageSize.getWidth();
  const pageH = pdf.internal.pageSize.getHeight();
  const maxW = 190, maxH = 277;

  for(let i=0;i<photos.length;i++){
    if(i>0) pdf.addPage();
    const img = new Image();
    img.src = photos[i];
    await new Promise(res => img.onload = res);
    const ratio = Math.min(maxW / img.width, maxH / img.height);
    const w = img.width * ratio;
    const h = img.height * ratio;
    const x = (pageW - w) / 2;
    const y = (pageH - h) / 2;
    pdf.addImage(photos[i], "JPEG", x, y, w, h);
  }

  let fournisseur = document.getElementById("fournisseur").value || "Fournisseur";
  let name = (numero || "numero") + "-" + fournisseur + ".pdf";
  pdf.save(name);
  lastPdf = name;
  toast("PDF généré");
}
document.getElementById("btnPdf").onclick = generatePdf;

function openMailTo(email) {
  let affaire = document.getElementById("affaire").value || "";
  let subject = encodeURIComponent((affaire || "Affaire") + " - Enregistrement BL");
  let body = encodeURIComponent("Ci-joint le BL " + (numero || ""));
  window.location = "mailto:" + email + "?subject=" + subject + "&body=" + body;
}
document.getElementById("btnMailRomain").onclick = () => openMailTo("romain.prieur@gcfrontonnais.fr");
document.getElementById("btnMailMorgan").onclick = () => openMailTo("morgan.lanaspeze@gcfrontonnais.fr");

document.getElementById("btnReset").onclick = () => {
  if(!confirm("Réinitialiser le bon ?")) return;
  numero = null;
  photos = [];
  lastPdf = "";
  document.getElementById("startCard").classList.remove("hidden");
  document.getElementById("numeroCard").classList.add("hidden");
  document.getElementById("date").value = today();
  document.getElementById("affaire").value = "";
  document.getElementById("chef").value = "";
  document.getElementById("fournisseur").value = "";
  renderThumbs();
  toast("Bon réinitialisé");
};

document.getElementById("date").value = today();
populateLists();
renderThumbs();
</script>

</body>
</html>
